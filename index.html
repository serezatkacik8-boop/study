<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой первый сайт</title>
  <style>
    h1{
      color: red;
    }
    p{
      color: darkgreen;
    }
    button {
      background: green;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      border-radius: 8px;
    }
    button:hover {
      background: darkgreen;
    }
    div{
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    body{
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
      background: lightgray;
    }
    a{
      color: blue;
      text-decoration: none;
    }
    a:hover{
      text-decoration: underline;
    }
    .img{
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <h1>Мой первый сайт</h1>
    <p>Я учусь frontend</p>
    <p>Мне это нравится</p>
    <button>Начать</button>
  </div>
  <div class="img">
    <img src="https://via.placeholder.com/200" alt="Картинка" width="200">
  </div>
  <div>
    <a href="https://youtube.com" target="_blank">Мой YouTube</a>
  </div>
</body>
</html>
